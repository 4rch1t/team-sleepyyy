<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VERIFAI - UPLOAD</title>
    <link rel="stylesheet" href="base.css">
    <script>
        // Check if coming back from OAuth
        const urlParams = new URLSearchParams(window.location.search);
        if (window.location.pathname.includes('index.html')) {
            // For the demo, being on index.html after redirect counts as logged in
            localStorage.setItem('isLoggedIn', 'true');
        }

        // Auth check
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="logo">VERIFAI</a>
        <div class="nav-links">
            <a href="index.html">PROCESS</a>
            <a href="history.html">HISTORY</a>
            <a href="#" onclick="logout()">LOGOUT</a>
        </div>
    </nav>

    <div class="container">
        <section class="hero" style="padding: 60px 0;">
            <span class="system-path">/ROOT/SYSTEM/SCAN_ENGINE</span>
            <h1 style="font-size: 4rem;">EVIDENCE_SCAN</h1>
            <p style="color:#888; text-transform:uppercase; font-size:0.7rem; letter-spacing:3px; margin-top: 10px;">AUTHORIZED SCANNING PROTOCOL ACTIVE</p>
        </section>
        
        <div class="box" style="margin-top:20px; border-color: rgba(255, 77, 0, 0.3);">
            <form id="upload-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                    <div class="form-group">
                        <label>AADHAAR_DOCUMENT</label>
                        <input type="file" name="aadhaar" required>
                    </div>
                    
                    <div class="form-group">
                        <label>PAN_DOCUMENT</label>
                        <input type="file" name="pan" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>UTILITY_BILL_EVIDENCE</label>
                    <input type="file" name="utility_bill" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%; letter-spacing: 2px;">INITIATE_PIPELINE</button>
            </form>
            
            <div id="loading" style="display:none; margin-top:20px; font-weight:bold; color:var(--accent-color);">
                ANALYZING DOCUMENTS... [TAMPER | EXTRACT | CONSISTENCY | RULES | SCORE]
            </div>
        </div>

        <div id="result-container" style="display:none;">
            <div class="box">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="margin:0;">VERIFICATION RESULT</h2>
                    <button id="download-pdf-btn" class="btn btn-outline" style="padding:10px 20px; font-size:0.7rem; display:none;">DOWNLOAD PDF REPORT</button>
                </div>
                <div id="decision-badge" class="badge">PENDING</div>
                
                <div id="reasons-box" style="margin-top:30px; border-top: 1px solid #333; padding-top:20px;">
                    <h3 style="font-size:0.8rem; color:#888;">REASONING TRACE:</h3>
                    <ul id="reasons-list" style="list-style:none; padding:0; margin-top:10px;"></ul>
                </div>
            </div>

            <div id="stage-breakdown"></div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000";

        // Protocol check
        if (window.location.protocol === 'file:') {
            window.location.href = "http://localhost:8000/";
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = "login.html";
        }

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const submitBtn = document.getElementById('submit-btn');
            const loading = document.getElementById('loading');
            const resultContainer = document.getElementById('result-container');
            
            submitBtn.disabled = true;
            loading.style.display = 'block';
            resultContainer.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/verify`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                displayResult(data);
            } catch (err) {
                alert('System Error: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function displayResult(data) {
            const container = document.getElementById('result-container');
            const badge = document.getElementById('decision-badge');
            const reasonsList = document.getElementById('reasons-list');
            const breakdown = document.getElementById('stage-breakdown');
            
            const downloadBtn = document.getElementById('download-pdf-btn');
            
            container.style.display = 'block';
            badge.innerText = data.decision;
            badge.className = `badge ${data.decision}`;
            
            // Setup Download PDF
            if (data.id) {
                downloadBtn.style.display = 'block';
                downloadBtn.onclick = () => {
                    window.location.href = `${API_URL}/report/${data.id}/pdf`;
                };
            }
            
            reasonsList.innerHTML = data.reasons.map(r => `<li style="margin-bottom:12px; color:#ddd; font-size:0.9rem;">
                <span style="color:var(--accent-color); margin-right:10px;">[WARN]</span>${r}
            </li>`).join('');
            
            let html = '';
            
            // Tamper Stage
            html += `<div class="stage-card"><h3>STAGE 1: FORENSICS & TAMPER ANALYSIS</h3>`;
            data.stage_outputs.tamper.forEach(t => {
                html += `<div class="data-row">
                    <span class="data-label">${t.document}</span> 
                    <span class="${t.tampered ? 'REJECTED' : 'APPROVED'}">${t.tampered ? 'DETECTION POSITIVE' : 'PASSED ELA'}</span>
                </div>`;
            });
            html += `</div>`;
            
            // Extraction Stage
            html += `<div class="stage-card"><h3>STAGE 2: MULTI-MODAL AI EXTRACTION</h3>`;
            Object.entries(data.stage_outputs.extraction).forEach(([doc, info]) => {
                html += `<div style="margin-bottom:20px; border-bottom:1px solid #222; padding-bottom:10px;">
                    <div class="data-row"><span class="data-label">SOURCE</span><span class="data-value">${doc.toUpperCase()}</span></div>
                    <div class="data-row"><span class="data-label">NAME</span><span class="data-value">${info.name}</span></div>
                    <div class="data-row"><span class="data-label">ID</span><span class="data-value">${info.id_number}</span></div>
                </div>`;
            });
            html += `</div>`;
            
            // Rules
            html += `<div class="stage-card"><h3>STAGE 3-4: REGULATORY & AML CHECKS</h3>`;
            data.checks.forEach(c => {
                html += `<div class="data-row">
                    <span class="data-label">${c.rule}</span> 
                    <span class="${c.pass ? 'APPROVED' : 'REJECTED'}">${c.pass ? 'COMPLIANT' : 'VIOLATION'}</span>
                </div>`;
            });
            html += `</div>`;
            
            breakdown.innerHTML = html;
            container.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>

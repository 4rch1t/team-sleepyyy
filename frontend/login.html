<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VERIFAI - LOGIN</title>
    <link rel="stylesheet" href="base.css">
</head>
<body>
    <div class="login-container">
        <h1 class="logo" style="font-size: 3rem; margin-bottom: 40px;">VERIFAI</h1>
        
        <div class="box">
            <h2 style="margin-bottom: 30px;">AUTHENTICATION</h2>
            
            <!-- Google Login -->
            <button class="google-btn" onclick="googleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
                CONTINUE WITH GOOGLE
            </button>
            
            <div class="divider">OR</div>
            
            <!-- Email Login -->
            <form id="login-form">
                <div class="form-group" style="text-align: left;">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>PASSWORD</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">ACCESS SYSTEM</button>
            </form>
        </div>
        
        <p style="color: #555; font-size: 0.8rem; text-transform: uppercase;">
            SECURE ACCESS ONLY. AUTHORIZED PERSONNEL ONLY.
        </p>
    </div>

    <script>
        function googleLogin() {
            // Placeholder for Google OAuth redirect
            alert("Redirecting to Google OAuth...\n(Requires GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET)");
            // window.location.href = "/auth/google";
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Mock login for demo
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = "index.html";
        });
    </script>
</body>
</html>

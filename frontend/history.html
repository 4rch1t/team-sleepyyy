<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VERIFAI - HISTORY</title>
    <link rel="stylesheet" href="base.css">
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="logo">VERIFAI</a>
        <div class="nav-links">
            <a href="index.html">PROCESS</a>
            <a href="history.html">HISTORY</a>
            <a href="#" onclick="logout()">LOGOUT</a>
        </div>
    </nav>

    <div class="container">
        <section class="hero">
            <h1>VERIFICATION<br><span style="color:var(--accent-color)">ARCHIVE</span></h1>
        </section>
        
        <div class="box">
            <table id="history-table">
                <thead>
                    <tr>
                        <th>DATE</th>
                        <th>DECISION</th>
                        <th>SCORE</th>
                        <th>REASONS</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <!-- Data populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000";

        // Protocol check
        if (window.location.protocol === 'file:') {
            window.location.href = "http://localhost:8000/";
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = "login.html";
        }

        async function fetchHistory() {
            try {
                const response = await fetch(`${API_URL}/history`);
                const data = await response.json();
                const tbody = document.getElementById('history-body');
                
                tbody.innerHTML = data.map(r => `
                    <tr>
                        <td style="font-size:0.8rem; color:#888;">${new Date(r.created_at).toLocaleString()}</td>
                        <td><span class="badge ${r.decision}">${r.decision}</span></td>
                        <td style="font-weight:900;">${r.confidence_score}%</td>
                        <td style="font-size:0.8rem; color:#ccc;">${r.reasons.slice(0, 2).join(', ')}${r.reasons.length > 2 ? '...' : ''}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('History Error:', err);
            }
        }

        fetchHistory();
    </script>
</body>
</html>

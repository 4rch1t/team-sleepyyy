<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VERIFAI - HISTORY</title>
    <link rel="stylesheet" href="base.css">
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="logo">VERIFAI</a>
        <div class="nav-links">
            <a href="index.html">PROCESS</a>
            <a href="history.html">HISTORY</a>
            <a href="#" onclick="logout()">LOGOUT</a>
        </div>
    </nav>

    <div class="container">
        <section class="hero" style="padding: 60px 0;">
            <span class="system-path">/ROOT/SYSTEM/ARCHIVE</span>
            <h1 style="font-size: 4rem;">VERIFICATION_LOGS</h1>
            <p style="color:#888; text-transform:uppercase; font-size:0.7rem; letter-spacing:3px; margin-top: 10px;">HISTORICAL EVIDENCE DATABASE</p>
        </section>
        
        <div class="box" style="border-color: rgba(255, 77, 0, 0.2);">
            <table id="history-table">
                <thead>
                    <tr>
                        <th>DATE</th>
                        <th>DECISION</th>
                        <th>REASONS</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <!-- Data populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000";

        // Protocol check
        if (window.location.protocol === 'file:') {
            window.location.href = "http://localhost:8000/";
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = "login.html";
        }

        async function fetchHistory() {
            try {
                const response = await fetch(`${API_URL}/history`);
                const data = await response.json();
                const tbody = document.getElementById('history-body');
                
                tbody.innerHTML = data.map(r => `
                    <tr>
                        <td style="font-size:0.8rem; color:#888;">${new Date(r.created_at).toLocaleString()}</td>
                        <td><span class="badge ${r.decision}">${r.decision}</span></td>
                        <td style="font-size:0.8rem; color:#ccc;">${r.reasons.slice(0, 2).join(', ')}${r.reasons.length > 2 ? '...' : ''}</td>
                        <td>
                            <button class="btn btn-outline" style="padding:5px 10px; font-size:0.6rem;" onclick="window.location.href='${API_URL}/report/${r.id}/pdf'">PDF</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('History Error:', err);
            }
        }

        fetchHistory();
    </script>
</body>
</html>
